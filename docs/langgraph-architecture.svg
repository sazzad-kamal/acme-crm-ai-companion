<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="supervisorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="responseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="endGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#f8fafc"/>

  <!-- Title -->
  <text x="600" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1e293b" text-anchor="middle">LangGraph Multi-Agent Architecture</text>

  <!-- Entry Point -->
  <rect x="520" y="60" width="160" height="50" rx="25" fill="#e2e8f0" filter="url(#shadow)"/>
  <text x="600" y="92" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">User Question</text>

  <!-- Arrow to Supervisor -->
  <line x1="600" y1="110" x2="600" y2="140" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Supervisor Node -->
  <rect x="480" y="150" width="240" height="70" rx="10" fill="url(#supervisorGrad)" filter="url(#shadow)"/>
  <text x="600" y="180" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Supervisor</text>
  <text x="600" y="200" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.9)" text-anchor="middle">Intent Classification</text>

  <!-- Specialized Agents Section -->
  <rect x="40" y="260" width="1120" height="200" rx="15" fill="rgba(59,130,246,0.1)" stroke="#3b82f6" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="600" y="285" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3b82f6" text-anchor="middle">Specialized Data Agents</text>

  <!-- Agent boxes -->
  <!-- Fetch -->
  <rect x="60" y="310" width="140" height="130" rx="8" fill="url(#agentGrad)" filter="url(#shadow)"/>
  <text x="130" y="340" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Fetch</text>
  <text x="130" y="365" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)" text-anchor="middle">Simple SQL</text>
  <line x1="80" y1="380" x2="180" y2="380" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="130" y="400" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.8)" text-anchor="middle">"Show all deals"</text>
  <text x="130" y="415" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.8)" text-anchor="middle">"List contacts"</text>

  <!-- Compare -->
  <rect x="220" y="310" width="140" height="130" rx="8" fill="url(#agentGrad)" filter="url(#shadow)"/>
  <text x="290" y="340" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Compare</text>
  <text x="290" y="365" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)" text-anchor="middle">A vs B Analysis</text>
  <line x1="240" y1="380" x2="340" y2="380" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="290" y="400" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.8)" text-anchor="middle">"Q1 vs Q2 revenue"</text>
  <text x="290" y="415" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.8)" text-anchor="middle">"Acme vs TechCorp"</text>

  <!-- Trend -->
  <rect x="380" y="310" width="140" height="130" rx="8" fill="url(#agentGrad)" filter="url(#shadow)"/>
  <text x="450" y="340" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Trend</text>
  <text x="450" y="365" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)" text-anchor="middle">Time-Series</text>
  <line x1="400" y1="380" x2="500" y2="380" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="450" y="400" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.8)" text-anchor="middle">"Revenue by month"</text>
  <text x="450" y="415" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.8)" text-anchor="middle">"Growth over time"</text>

  <!-- Planner -->
  <rect x="540" y="310" width="140" height="130" rx="8" fill="url(#agentGrad)" filter="url(#shadow)"/>
  <text x="610" y="340" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Planner</text>
  <text x="610" y="365" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)" text-anchor="middle">Multi-Step</text>
  <line x1="560" y1="380" x2="660" y2="380" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="610" y="400" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.8)" text-anchor="middle">"Show X and</text>
  <text x="610" y="415" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.8)" text-anchor="middle">compare Y"</text>

  <!-- Export -->
  <rect x="700" y="310" width="140" height="130" rx="8" fill="url(#agentGrad)" filter="url(#shadow)"/>
  <text x="770" y="340" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Export</text>
  <text x="770" y="365" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)" text-anchor="middle">CSV/PDF/JSON</text>
  <line x1="720" y1="380" x2="820" y2="380" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="770" y="400" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.8)" text-anchor="middle">"Export to CSV"</text>
  <text x="770" y="415" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.8)" text-anchor="middle">"Download report"</text>

  <!-- Health -->
  <rect x="860" y="310" width="140" height="130" rx="8" fill="url(#agentGrad)" filter="url(#shadow)"/>
  <text x="930" y="340" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Health</text>
  <text x="930" y="365" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)" text-anchor="middle">Account Scoring</text>
  <line x1="880" y1="380" x2="980" y2="380" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="930" y="400" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.8)" text-anchor="middle">"Acme health"</text>
  <text x="930" y="415" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.8)" text-anchor="middle">"At risk accounts"</text>

  <!-- Direct Response (Clarify/Help) -->
  <rect x="1020" y="310" width="120" height="130" rx="8" fill="#94a3b8" filter="url(#shadow)"/>
  <text x="1080" y="340" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Direct</text>
  <text x="1080" y="365" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)" text-anchor="middle">No SQL Needed</text>
  <line x1="1040" y1="380" x2="1120" y2="380" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="1080" y="400" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.8)" text-anchor="middle">clarify: "yes"</text>
  <text x="1080" y="415" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.8)" text-anchor="middle">help: "hello"</text>

  <!-- Arrows from Supervisor to Agents -->
  <path d="M 520 220 Q 520 265 130 300" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 540 220 Q 540 265 290 300" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 560 220 Q 560 265 450 300" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 600 220 L 610 300" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 640 220 Q 640 265 770 300" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 660 220 Q 660 265 930 300" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 680 220 Q 680 265 1080 300" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Answer Node -->
  <rect x="430" y="500" width="200" height="70" rx="10" fill="url(#responseGrad)" filter="url(#shadow)"/>
  <text x="530" y="530" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Answer</text>
  <text x="530" y="550" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.9)" text-anchor="middle">Synthesize + Evidence Tags</text>

  <!-- Arrows from Agents to Answer -->
  <path d="M 130 440 Q 130 470 430 510" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 290 440 Q 290 470 430 515" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 450 440 L 480 495" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 610 440 L 580 495" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 770 440 Q 770 470 630 515" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 930 440 Q 930 470 630 510" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Loop back arrow (needs_more_data) -->
  <path d="M 430 535 Q 30 535 30 375 Q 30 310 55 310" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="5,3"/>
  <text x="25" y="430" font-family="Arial, sans-serif" font-size="10" fill="#ef4444" transform="rotate(-90 25 430)">needs_more_data</text>

  <!-- Action and Followup -->
  <rect x="350" y="620" width="150" height="60" rx="8" fill="url(#responseGrad)" filter="url(#shadow)"/>
  <text x="425" y="650" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Action</text>
  <text x="425" y="668" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)" text-anchor="middle">Next Steps</text>

  <rect x="560" y="620" width="150" height="60" rx="8" fill="url(#responseGrad)" filter="url(#shadow)"/>
  <text x="635" y="650" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Followup</text>
  <text x="635" y="668" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)" text-anchor="middle">Questions</text>

  <!-- Arrows from Answer to Action/Followup -->
  <path d="M 480 570 L 440 615" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 580 570 L 620 615" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="530" y="595" font-family="Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">has_data</text>

  <!-- Direct to END -->
  <path d="M 1080 440 L 1080 715" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- END nodes -->
  <rect x="350" y="710" width="150" height="40" rx="20" fill="url(#endGrad)" filter="url(#shadow)"/>
  <text x="425" y="735" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">END</text>

  <rect x="560" y="710" width="150" height="40" rx="20" fill="url(#endGrad)" filter="url(#shadow)"/>
  <text x="635" y="735" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">END</text>

  <rect x="1005" y="710" width="150" height="40" rx="20" fill="url(#endGrad)" filter="url(#shadow)"/>
  <text x="1080" y="735" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">END</text>

  <!-- Arrows to END -->
  <line x1="425" y1="680" x2="425" y2="705" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="635" y1="680" x2="635" y2="705" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Legend -->
  <rect x="40" y="760" width="400" height="30" rx="5" fill="white" stroke="#e2e8f0"/>
  <rect x="50" y="768" width="14" height="14" rx="2" fill="url(#supervisorGrad)"/>
  <text x="70" y="780" font-family="Arial, sans-serif" font-size="10" fill="#475569">Supervisor</text>
  <rect x="140" y="768" width="14" height="14" rx="2" fill="url(#agentGrad)"/>
  <text x="160" y="780" font-family="Arial, sans-serif" font-size="10" fill="#475569">Data Agent</text>
  <rect x="240" y="768" width="14" height="14" rx="2" fill="url(#responseGrad)"/>
  <text x="260" y="780" font-family="Arial, sans-serif" font-size="10" fill="#475569">Response</text>
  <rect x="330" y="768" width="14" height="14" rx="2" fill="url(#endGrad)"/>
  <text x="350" y="780" font-family="Arial, sans-serif" font-size="10" fill="#475569">Terminal</text>
</svg>