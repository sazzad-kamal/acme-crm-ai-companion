# E2E evaluation test cases
# Contains edge cases, adversarial tests, and realistic user input tests
#
# For RAG tests (minimal, error_recovery, ambiguous, realistic_input, multi_turn):
#   expected_answer provides ground truth for RAGAS answer_correctness metric
#
# For security tests (adversarial, anti_hallucination):
#   No expected_answer - evaluated via refusal_correct and forbidden_keywords

# =============================================================================
# MINIMAL/SHORT QUERY TESTS (6 tests)
# Tests edge case of very brief inputs - can cause unexpected behavior
# =============================================================================
- id: e2e_minimal_empty
  question: ""
  category: minimal
  expected_company: null
  expected_intent: null
  expected_answer: |
    I can help you with your CRM data. Try asking about a specific company,
    your pipeline, renewals, or forecast.

- id: e2e_minimal_company_name
  question: "acme"
  category: minimal
  expected_company: ACME-MFG
  expected_intent: company_status
  expected_answer: |
    Acme Manufacturing is an active account in Manufacturing industry.
    They have multiple open opportunities and recent activity.

- id: e2e_minimal_renewals
  question: "renewals"
  category: minimal
  expected_company: null
  expected_intent: renewals
  expected_answer: |
    Here are your upcoming renewals. You have several accounts due for renewal
    with varying health statuses and values.

- id: e2e_minimal_question_mark
  question: "pipeline?"
  category: minimal
  expected_company: null
  expected_intent: pipeline_summary
  expected_answer: |
    Your pipeline includes opportunities across different stages.
    The total pipeline value and number of open deals are shown.

- id: e2e_minimal_forecast
  question: "forecast"
  category: minimal
  expected_company: null
  expected_intent: forecast
  expected_answer: |
    The forecast for this period shows expected revenue based on
    weighted pipeline values and deal probabilities.

- id: e2e_minimal_at_risk
  question: "at risk"
  category: minimal
  expected_company: null
  expected_intent: deals_at_risk
  expected_answer: |
    Here are the deals currently flagged as at-risk. These may need
    attention due to stalled progress or other warning signs.

# =============================================================================
# ERROR RECOVERY TESTS (6 tests)
# Tests graceful handling of bad input - can cause crashes/errors
# =============================================================================
- id: e2e_error_very_long_input
  question: "__LONG_INPUT__"  # Handled specially in loader
  category: error_recovery
  expected_company: ACME-MFG
  expected_intent: company_status
  expected_answer: |
    Acme Manufacturing is an active account. Here's the status information
    including recent activities and opportunities.

- id: e2e_error_company_not_found
  question: "What's the status of XYZ Nonexistent Corp?"
  category: error_recovery
  expected_company: null
  expected_intent: company_status
  expected_answer: |
    I couldn't find a company matching "XYZ Nonexistent Corp" in your CRM.
    Please check the company name or try a different search.

- id: e2e_error_typo_company
  question: "Show me Akme Manufakturing"
  category: error_recovery
  expected_company: ACME-MFG
  expected_intent: company_status
  expected_answer: |
    I found Acme Manufacturing (matching your search). This is an active
    account with recent activity and open opportunities.

- id: e2e_error_empty_result
  question: "Show activities for a company with no activities"
  category: error_recovery
  expected_company: null
  expected_intent: activities
  expected_answer: |
    I couldn't find the company you mentioned. Please specify a valid
    company name to see their activities.

- id: e2e_error_invalid_date
  question: "Show renewals for February 30th"
  category: error_recovery
  expected_company: null
  expected_intent: renewals
  expected_answer: |
    Here are your upcoming renewals. Note that February 30th is not a valid
    date, so showing all upcoming renewals instead.

- id: e2e_error_partial_data
  question: "What's the pipeline value for a company with incomplete data?"
  category: error_recovery
  expected_company: null
  expected_intent: pipeline_summary
  expected_answer: |
    Here's your overall pipeline summary. To see a specific company's pipeline,
    please provide the company name.

# =============================================================================
# AMBIGUOUS INTENT TESTS (3 tests)
# Tests how agent handles unclear queries - can cause hallucination
# =============================================================================
- id: e2e_ambiguous_opportunities
  question: "Tell me about opportunities"
  category: ambiguous
  expected_company: null
  expected_intent: pipeline_summary
  expected_answer: |
    Here's your pipeline summary showing all open opportunities across
    different stages with their values and expected close dates.

- id: e2e_ambiguous_pronoun
  question: "Show me their deals"
  category: ambiguous
  expected_company: null
  expected_intent: pipeline_summary
  expected_answer: |
    I'm not sure which company you're referring to. Here's your overall
    pipeline. Please specify a company name for specific deals.

- id: e2e_ambiguous_projections
  question: "show projections"
  category: ambiguous
  expected_company: null
  expected_intent: forecast
  expected_answer: |
    Here's your forecast showing projected revenue based on the
    weighted pipeline and deal probabilities.

