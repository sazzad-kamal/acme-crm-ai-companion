# Expected SQL Results - assertions for query validation
# Based on actual CSV data - validates correctness of SQL results
#
# Assertion types:
#   row_count: Exact number of rows
#   row_count_min/max: Range of rows
#   must_contain_all: All values must appear
#   must_not_contain: Values must NOT appear (critical for filtering)
#   total_value: Sum of value column (10% tolerance)
#   exact_values: Exact column values

# =============================================================================
# OPPORTUNITIES BRANCH - Starter: "What deals are in the pipeline?"
# All deals visible (no owner filtering)
# =============================================================================

"What deals are in the pipeline?":
  row_count_min: 8  # All open opportunities
  must_contain_all: ["Acme", "Beta", "Crown", "Delta", "Fusion", "Harbor", "Eastern"]
  must_not_contain: ["Closed Won", "Closed Lost"]

"How are deals distributed by stage?":
  row_count_min: 8
  must_contain_all: ["Proposal", "Qualified", "Negotiation", "Discovery"]
  must_not_contain: ["Closed Won", "Closed Lost"]

"What are the highest value deals?":
  row_count_min: 4
  must_contain_all: ["32000", "26000", "24000", "22000"]

"Which deals involve Acme Corp?":
  row_count: 2
  must_contain_all: ["Acme", "15000", "24000"]
  must_not_contain: ["Crown", "Beta", "Delta", "Green"]
  total_value: 39000

"What deals are in Proposal stage?":
  row_count_min: 2
  must_contain: "Proposal"
  must_not_contain: ["Qualified", "Negotiation", "Discovery", "Closed"]

"What deals are in Qualified stage?":
  row_count_min: 3
  must_contain: "Qualified"
  must_not_contain: ["Proposal", "Negotiation", "Closed"]

"What deals are in Negotiation stage?":
  row_count: 1
  must_contain_all: ["Negotiation", "Beta", "32000"]
  must_not_contain: ["Proposal", "Qualified", "Discovery"]

"Which deals are over $50,000?":
  row_count: 0
  # No deals exceed $50,000

"Which deals are under $20,000?":
  row_count_min: 4
  must_contain_all: ["15000", "18000", "12000"]
  must_not_contain: ["32000", "26000", "24000", "22000"]

"What's the total pipeline value?":
  row_count_min: 1

"Who are the Acme contacts?":
  row_count: 3
  must_contain_all: ["Anna", "Beth", "Joe"]
  must_not_contain: ["Maria", "Erin", "Carlos"]

"What activities happened with Acme?":
  row_count_min: 1
  must_contain: "Acme"
  must_not_contain: ["Beta", "Delta", "Green"]

