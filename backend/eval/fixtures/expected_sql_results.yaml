# Expected SQL Results for flow eval - validates that SQL queries return correct data
#
# Assertion types:
# - row_count_min: Minimum number of rows expected
# - row_count_max: Maximum number of rows expected
# - total_value: Expected sum of value column
# - must_contain: Values that must appear in any column of any row
# - must_contain_all: All these values must appear (AND logic)
# - must_contain_any: At least one of these values must appear (OR logic)
# - column_values: Specific column must contain these values
#
# Only SQL-only questions (expected_rag: false) need assertions here.
# 15 SQL questions: 5 sales rep, 2 CSM, 8 manager

# =============================================================================
# SALES REP BRANCH (5 SQL questions)
# Owner: jsmith - 4 open opps: ACME-UPGRADE ($15k), ACME-RENEWAL ($24k),
#                              CROWN-RENEW ($18k), FUSION-UPSELL ($12k)
# =============================================================================

"How's my pipeline by stage and health?":
  # jsmith pipeline by stage: Qualified ($36k = $24k + $12k), Proposal ($33k = $15k + $18k)
  # Health: healthy (all 4 opps - ACME, CROWN, FUSION)
  row_count_min: 2
  total_value: 69000  # $15k + $24k + $18k + $12k
  must_contain_all:
    - "Proposal"
    - "Qualified"
    - "healthy"

"Which deals need attention?":
  # jsmith deals needing attention - could include high days_in_stage or at-risk health
  # All jsmith opps are healthy, but have varying days_in_stage (50-65)
  row_count_min: 1
  must_contain_any:
    - "Acme"
    - "Crown"
    - "Fusion"

"What's my forecast confidence by stage?":
  # Forecast weights: New=5%, Discovery=10%, Qualified=25%, Proposal=50%, Negotiation=75%
  # jsmith: Qualified ($36k * 25% = $9k), Proposal ($33k * 50% = $16.5k)
  # Total weighted: ~$25.5k
  row_count_min: 2
  must_contain_all:
    - "Qualified"
    - "Proposal"

"How long has each deal been in current stage?":
  # jsmith opps: ACME-UPGRADE (50 days), ACME-RENEWAL (60 days),
  #              CROWN-RENEW (60 days), FUSION-UPSELL (65 days)
  row_count_min: 4
  must_contain_all:
    - "Acme"
    - "Crown"
    - "Fusion"

"Which deals have the highest velocity?":
  # Velocity = value / days_in_stage or similar calculation
  # Lower days_in_stage with higher value = higher velocity
  # ACME-UPGRADE: $15k / 50 days = $300/day
  # CROWN-RENEW: $18k / 60 days = $300/day
  # ACME-RENEWAL: $24k / 60 days = $400/day
  # FUSION-UPSELL: $12k / 65 days = $185/day
  row_count_min: 1
  must_contain_any:
    - "Acme"
    - "Crown"

# =============================================================================
# CSM BRANCH (2 SQL questions)
# Owner: amartin - 2 open opps: DELTA-RENEW ($22k), DELTA-EXPAND ($15k)
# =============================================================================

"Which renewals are at risk and why?":
  # amartin renewals at risk: DELTA-RENEW at Delta Health (at-risk-renewal-soon)
