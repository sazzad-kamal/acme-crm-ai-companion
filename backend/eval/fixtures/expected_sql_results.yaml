  row_count_min: 1
  must_contain_all:
    - "Delta"
    - "at-risk"

"How does my Q1 pipeline compare to Q4?":
  # Compares current quarter vs previous quarter
  # amartin current opps: DELTA-RENEW ($22k), DELTA-EXPAND ($15k) = $37k
  row_count_min: 1
  total_value: 37000

